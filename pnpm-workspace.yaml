packages:
  - "packages/*"

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  '@swc/core': true
  bcrypt: true
  prisma: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - "prisma"
  - "bcrypt"
  - "@swc/core"
  - "@scarf/scarf"
  - "sharp"
  - "unrs-resolver"
